<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { padding: 20px; }
        .map-container { height: 500px; margin-top: 20px; border-radius: 10px; border: 1px solid #ddd; }
        .magnitude-high { color: #dc3545; font-weight: bold; }
        .tsunami-warning { color: #dc3545; font-weight: bold; }
        tr { cursor: pointer; }
        tr:hover { background-color: #f8f9fa !important; }
        th { cursor: help; }
        footer { margin-top: 50px; padding: 20px 0; text-align: center; color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">Recent Earthquakes</h1>

    <div class="row mb-3">
        <div class="col-md-3">
            <label class="form-label">Minimum Magnitude</label>
            <select id="minMag" class="form-select">
                <option value="0">All</option>
                <option value="1.0">1.0+</option>
                <option value="1.5">1.5+</option>
                <option value="2.0" selected>2.0+</option>
                <option value="2.5">2.5+</option>
                <option value="3.0">3.0+</option>
                <option value="4.0">4.0+</option>
                <option value="5.0">5.0+</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Time Filter (Last Hour)</label>
            <select id="timeFilter" class="form-select">
                <option value="0" selected>All (Last Hour)</option>
                <option value="1800000">Last 30 minutes</option>
                <option value="600000">Last 10 minutes</option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button id="refreshBtn" class="btn btn-primary w-100">
            Refresh from USGS
            </button>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <span id="lastRefreshed" class="text-muted small"></span>
        </div>
    </div>

    <div id="status" class="alert" style="display: none;"></div>

    <table class="table table-striped table-hover" id="earthquakeTable">
        <thead class="table-dark">
        <tr>
            <th data-bs-toggle="tooltip" data-bs-title="Magnitude of the earthquake">Magnitude</th>
            <th data-bs-toggle="tooltip" data-bs-title="Type of magnitude (ml, md, etc.)">Mag Type</th>
            <th data-bs-toggle="tooltip" data-bs-title="Location description">Place</th>
            <th data-bs-toggle="tooltip" data-bs-title="Full title from USGS">Title</th>
            <th data-bs-toggle="tooltip" data-bs-title="Depth of the earthquake in kilometers">Depth (km)</th>
            <th data-bs-toggle="tooltip" data-bs-title="Significance: Higher value = more important event">Sig</th>
            <th data-bs-toggle="tooltip" data-bs-title="Tsunami warning: Possible tsunami threat">Tsunami</th>
            <th data-bs-toggle="tooltip" data-bs-title="Data quality: 'automatic' or 'reviewed'">Status</th>
            <th data-bs-toggle="tooltip" data-bs-title="Time when the earthquake occurred">Time</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h4 class="mt-5"> Earthquake Locations</h4>
    <div id="map" class="map-container"></div>


    <h4 class="mt-5">🤖 Earthquake AI Assistant</h4>

    <div class="card p-3 mb-3">
        <div id="chatBox" style="height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; background: #fafafa;"></div>

        <div class="input-group mt-2">
            <input type="text" id="chatInput" class="form-control" placeholder="Ask something about earthquakes...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <footer>
        <p>Made by Aleksandar Stojanov</p>
        <small>Earthquake Monitor using USGS Real-time Data • Spring Boot + PostgreSQL</small>
    </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = '/api/earthquakes';
    let map;
    let markers = [];

    function initMap() {
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
    }

    function getFilters() {
        const minMag = parseFloat(document.getElementById('minMag').value) || null;
        const ms = parseInt(document.getElementById('timeFilter').value);
        const afterTime = ms > 0 ? Date.now() - ms : null;
        return { minMag, afterTime };
    }

    function loadEarthquakes() {
        const { minMag, afterTime } = getFilters();
        let url = API_URL;
        const params = [];
        if (minMag !== null) params.push(`minMag=${minMag}`);
        if (afterTime !== null) params.push(`after=${afterTime}`);
        if (params.length > 0) url += '?' + params.join('&');

        fetch(url)
            .then(r => r.json())
            .then(data => {
                const tbody = document.querySelector('#earthquakeTable tbody');
                tbody.innerHTML = '';
                document.getElementById('lastRefreshed').textContent = 'Last refreshed: ' + new Date().toLocaleString();

                markers.forEach(m => map.removeLayer(m));
                markers = [];

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="10" class="text-center text-muted">No earthquakes found with current filters</td></tr>`;
                    return;
                }

                data.forEach(eq => {
                    const row = document.createElement('tr');
                    const timeStr = eq.timeFormatted;
                    const magClass = eq.mag >= 4 ? 'magnitude-high' : '';
                    const tsunamiClass = (eq.tsunami === 1) ? 'tsunami-warning' : '';

                    row.innerHTML = `
                            <td><span class="${magClass}">${eq.mag}</span></td>
                            <td>${eq.magType || '-'}</td>
                            <td>${eq.place || '-'}</td>
                            <td>${eq.title || '-'}</td>
                            <td>${eq.depth ? eq.depth.toFixed(1) : '-'}</td>
                            <td>${eq.sig || '-'}</td>
                            <td><span class="${tsunamiClass}">${eq.tsunami === 1 ? 'YES' : 'No'}</span></td>
                            <td>${eq.status || '-'}</td>
                            <td>${timeStr}</td>
                            <td>
                                <button class="btn btn-sm btn-danger delete-btn" data-id="${eq.id}">Delete Record</button>
                            </td>
                        `;

                    row.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('delete-btn')) {
                            focusOnEarthquake(eq);
                        }
                    });

                    tbody.appendChild(row);

                    if (eq.latitude && eq.longitude) {
                        const popupContent = `
                                <strong>${eq.title}</strong><br>
                                Mag: <b>${eq.mag}</b> (${eq.magType}) | Depth: ${eq.depth ? eq.depth.toFixed(1)+' km' : 'N/A'}<br>
                                ${eq.place}<br>
                                Sig: ${eq.sig} | Status: ${eq.status}
                            `;
                        const marker = L.marker([eq.latitude, eq.longitude]).addTo(map);
                        marker.bindPopup(popupContent);
                        markers.push(marker);
                    }
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('Delete this earthquake record?')) {
                            const id = btn.getAttribute('data-id');
                            fetch(`${API_URL}/${id}`, { method: 'DELETE' })
                                .then(() => loadEarthquakes());
                        }
                    });
                });
            })
            .catch(err => console.error('Error:', err));
    }

    function focusOnEarthquake(eq) {
        if (!eq.latitude || !eq.longitude) return;

        map.flyTo([eq.latitude, eq.longitude], 8, { duration: 1.5 });

        markers.forEach(marker => {
            const pos = marker.getLatLng();
            if (Math.abs(pos.lat - eq.latitude) < 0.01 && Math.abs(pos.lng - eq.longitude) < 0.01) {
                marker.openPopup();
            }
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', () => {
        const status = document.getElementById('status');
        status.className = 'alert alert-info';
        status.textContent = 'Fetching latest data from USGS...';
        status.style.display = 'block';

        fetch(API_URL + '/refresh', { method: 'POST' })
            .then(r => r.text())
            .then(msg => {
                status.className = 'alert alert-success';
                status.textContent = msg;
                loadEarthquakes();
            })
            .catch(() => {
                status.className = 'alert alert-danger';
                status.textContent = 'Refresh failed';
            });
    });

    document.getElementById('minMag').addEventListener('change', loadEarthquakes);
    document.getElementById('timeFilter').addEventListener('change', loadEarthquakes);

    window.onload = () => {
        initMap();
        loadEarthquakes();
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
        [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el));
    };

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");

        const msg = document.createElement("div");
        msg.style.marginBottom = "10px";

        msg.innerHTML = `
        <b>${sender}:</b> ${text}
    `;

        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("chatInput");
        const question = input.value.trim();

        if (!question) return;

        appendMessage("You", question);
        input.value = "";

        fetch("/api/ai/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question })
        })
            .then(res => res.json())
            .then(data => {
                let answer = data.answer;

                if (!answer) {
                    answer = JSON.stringify(data).slice(0, 500) + "...";
                }

                appendMessage("AI", answer);
            })
            .catch(err => {
                appendMessage("AI", "Error: Could not get response");
            });
    }
</script>
</body>
</html>
